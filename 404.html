<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Ice & Wheels</title>
    <meta name="theme-color" content="#1a0d06">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        (function() {
            var t = localStorage.getItem('ice-wheels-theme') ||
                    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="brand-link">
                <i class="fas fa-snowflake brand-icon"></i>
                <span class="brand-text">
                    <span class="brand-name">Ice & Wheels</span>
                    <span class="brand-tagline">Toronto Skating Guide</span>
                </span>
            </a>
        </div>
    </header>

    <div class="container">
        <main>
            <section class="section-hero">
                <div class="hero-content">
                    <div style="font-size:4rem;margin-bottom:1rem">🔍</div>
                    <h2 id="title-404">Page Not Found</h2>
                    <p id="msg-404">That page doesn't exist or may have moved.</p>
                    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem">
                        <a href="index.html" class="button button-primary">🏠 <span id="home-lbl">Home</span></a>
                        <a href="locations.html" class="button button-secondary" id="locs-lbl">Find Locations</a>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        (function() {
            var lang = localStorage.getItem('ice-wheels-lang') || 'en';
            var fr = lang === 'fr';
            document.getElementById('title-404').textContent = fr ? 'Page introuvable' : 'Page Not Found';
            document.getElementById('msg-404').textContent = fr ? 'Cette page n\'existe pas ou a peut-être été déplacée.' : 'That page doesn\'t exist or may have moved.';
            document.getElementById('home-lbl').textContent = fr ? 'Accueil' : 'Home';
            document.getElementById('locs-lbl').textContent = fr ? 'Trouver des lieux' : 'Find Locations';
        })();
    </script>
</body>
</html>
